<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREVIEW // SEJERODEV</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #080808; --accent: #ff4d00; --text: #d0d0d0; --border: #1c1c1c; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; padding: 40px 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; border: 1px solid var(--border); padding: 30px; background: #111; position: relative; }
        .container::before { content: 'CONFIDENTIAL'; position: absolute; top: -10px; left: 20px; background: var(--accent); color: #000; font-size: 10px; padding: 2px 8px; font-weight: bold; }
        h1 { font-family: 'Unbounded', sans-serif; font-size: 1.5rem; color: var(--accent); margin-bottom: 5px; }
        .meta { font-size: 11px; color: #555; text-transform: uppercase; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        audio { width: 100%; filter: invert(1) hue-rotate(180deg); margin: 20px 0; }
        .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .spec-item span { font-size: 9px; color: #555; display: block; }
        .btn-dl { display: block; text-align: center; background: var(--accent); color: #000; text-decoration: none; padding: 15px; font-family: 'Unbounded'; font-size: 12px; margin-top: 30px; transition: transform 0.2s; }
        .btn-dl:hover { transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="container">
        <h1>PROJECT: MIRAGE</h1>
        <div class="meta">Asset ID: #3205987293857 // Status: Draft v1</div>
        
        <p>Hola equipo! Acá les dejo la primera versión del track ambiental para la zona del desierto.</p>

        <audio controls>
            <source src="track-v1.mp3" type="audio/mpeg">
        </audio>

        <div class="specs">
            <div class="spec-item"><span>BPM</span><strong>124</strong></div>
            <div class="spec-item"><span>KEY</span><strong>F# MINOR</strong></div>
            <div class="spec-item"><span>FORMAT</span><strong>WAV 48kHz/24bit</strong></div>
            <div class="spec-item"><span>LENGTH</span><strong>02:45</strong></div>
        </div>

        <a href="track-v1.mp3" download class="btn-dl">DOWNLOAD MASTER FILE</a>
    </div>
</body>
</html>
